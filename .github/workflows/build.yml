name: Build EmulationStation ARMHF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Enable ARMHF + fix repos
      run: |
        sudo dpkg --add-architecture armhf
    
        sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://ports.ubuntu.com/ubuntu-ports|g' /etc/apt/sources.list
        sudo sed -i 's|http://archive.ubuntu.com/ubuntu|http://ports.ubuntu.com/ubuntu-ports|g' /etc/apt/sources.list
        sudo sed -i 's|http://security.ubuntu.com/ubuntu|http://ports.ubuntu.com/ubuntu-ports|g' /etc/apt/sources.list
    
        # Add explicit ubuntu-ports repositories for armhf support
        sudo tee /etc/apt/sources.list.d/ubuntu-ports.list > /dev/null << 'EOF'
        deb http://ports.ubuntu.com/ubuntu-ports/ noble main restricted universe multiverse
        deb-src http://ports.ubuntu.com/ubuntu-ports/ noble main restricted universe multiverse
        
        deb http://ports.ubuntu.com/ubuntu-ports/ noble-updates main restricted universe multiverse
        deb-src http://ports.ubuntu.com/ubuntu-ports/ noble-updates main restricted universe multiverse
        
        deb http://ports.ubuntu.com/ubuntu-ports/ noble-security main restricted universe multiverse
        deb-src http://ports.ubuntu.com/ubuntu-ports/ noble-security main restricted universe multiverse
        
        deb http://ports.ubuntu.com/ubuntu-ports/ noble-backports main restricted universe multiverse
        deb-src http://ports.ubuntu.com/ubuntu-ports/ noble-backports main restricted universe multiverse
        EOF
        
        sudo apt update
        
    - name: Install toolchain + deps
      run: |
        sudo apt install -y \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          cmake git pkg-config \
          libsdl2-dev:armhf \
          libfreeimage-dev:armhf \
          libfreetype6-dev:armhf \
          libasound2-dev:armhf \
          libudev-dev:armhf \
          libboost-all-dev:armhf \
          libeigen3-dev:armhf

    - name: Clone EmulationStation
      run: |
        git clone https://github.com/Aloshi/EmulationStation.git

    - name: Build
      run: |
        cd EmulationStation
        mkdir build && cd build

        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=../../toolchain-armhf.cmake \
          -DCMAKE_BUILD_TYPE=Release

        make -j$(nproc)

    - name: Strip binary (reduce size)
      run: |
        arm-linux-gnueabihf-strip EmulationStation/build/emulationstation || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: emulationstation-armhf
        path: EmulationStation/build/emulationstation
